name: .NET engine tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show machine info
        shell: pwsh
        run: |
          hostname
          dotnet --info
          git --version

      - name: Restore
        shell: pwsh
        run: dotnet restore king-of-tokyo-engine\KingOfTokyo.Engine.slnx

      - name: Build
        shell: pwsh
        run: dotnet build king-of-tokyo-engine\KingOfTokyo.Engine.slnx --configuration Release --no-restore

      - name: Test
        shell: pwsh
        run: dotnet test king-of-tokyo-engine\KingOfTokyo.Engine.slnx --configuration Release --no-build --logger "console;verbosity=detailed"

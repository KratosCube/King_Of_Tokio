name: .NET engine tests

on:
  workflow_dispatch:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: [self-hosted, Windows, X64]

    steps:
      - name: Checkout latest repository state
        uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 1

      - name: Show checked out commit
        shell: powershell
        run: |
          git status
          git rev-parse HEAD
          git log -1 --oneline

      - name: Show machine info
        shell: powershell
        run: |
          hostname
          dotnet --info
          git --version

      - name: Restore
        shell: powershell
        run: dotnet restore king-of-tokyo-engine\KingOfTokyo.Engine.slnx

      - name: Build
        shell: powershell
        run: dotnet build king-of-tokyo-engine\KingOfTokyo.Engine.slnx --configuration Release --no-restore

      - name: Test
        shell: powershell
        run: dotnet test king-of-tokyo-engine\KingOfTokyo.Engine.slnx --configuration Release --no-build --logger "console;verbosity=detailed"
